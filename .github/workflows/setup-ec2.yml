name: EC2 Setup

on:
  workflow_dispatch:
    inputs:
      target:
        description: '세팅할 EC2 선택'
        required: true
        type: choice
        options:
          - prod
          - monitoring
          - both

jobs:
  setup-prod:
    if: ${{ inputs.target == 'prod' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Prod EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Docker 설치
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io docker-compose-plugin git
              sudo systemctl enable --now docker
              sudo usermod -aG docker ubuntu
            else
              echo "Docker already installed, skipping"
            fi

            # infra repo 클론 또는 pull
            if [ -d ~/wir/infra ]; then
              git -C ~/wir/infra pull
            else
              mkdir -p ~/wir
              git clone ${{ secrets.INFRA_REPO_URL }} ~/wir/infra
            fi

  setup-monitoring:
    if: ${{ inputs.target == 'monitoring' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Monitoring EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_MONITORING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Docker 설치
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io docker-compose-plugin git
              sudo systemctl enable --now docker
              sudo usermod -aG docker ubuntu
            else
              echo "Docker already installed, skipping"
            fi

            # infra repo 클론 또는 pull
            if [ -d ~/wir/infra ]; then
              git -C ~/wir/infra pull
            else
              mkdir -p ~/wir
              git clone ${{ secrets.INFRA_REPO_URL }} ~/wir/infra
            fi
