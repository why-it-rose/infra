version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/wir-backend:${BACKEND_IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    networks:
      - wir-network

  batch:
    image: ${DOCKERHUB_USERNAME}/wir-batch:${BATCH_IMAGE_TAG:-dev}
    restart: unless-stopped
    env_file:
      - .env.dev
    networks:
      - wir-network

  ai:
    image: ${DOCKERHUB_USERNAME}/wir-ai:${AI_IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    networks:
      - wir-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../ec2/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - ai
    networks:
      - wir-network

networks:
  wir-network:
    driver: bridge
