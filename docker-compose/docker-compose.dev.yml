version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/wir-backend:${BACKEND_IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    networks:
      - wir-network

  batch:
    image: ${DOCKERHUB_USERNAME}/wir-batch:${BATCH_IMAGE_TAG:-dev}
    restart: unless-stopped
    env_file:
      - .env.dev
    networks:
      - wir-network

  ai:
    image: ${DOCKERHUB_USERNAME}/wir-ai:${AI_IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    networks:
      - wir-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/nginx/entrypoint.sh"]
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../ec2/nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - ../ec2/nginx/default.conf:/etc/nginx/templates/default-http.conf:ro
      - ../ec2/nginx/default-https.conf.template:/etc/nginx/templates/default-https.conf.template:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - backend
      - ai
    networks:
      - wir-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot

networks:
  wir-network:
    driver: bridge

volumes:
  certbot-certs:
  certbot-www:
