version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    environment:
      - PROD_EC2_HOST=${PROD_EC2_HOST}
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    volumes:
      - ../ec2/monitoring/prometheus-entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ../ec2/monitoring/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring-network

  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ../ec2/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../ec2/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
