version: '3.8'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/wir-backend:${BACKEND_IMAGE_TAG:-prod}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    networks:
      - wir-network

  batch:
    image: ${DOCKERHUB_USERNAME}/wir-batch:${BATCH_IMAGE_TAG:-prod}
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - wir-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../ec2/nginx/default-prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - wir-network

  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    environment:
      - MONITORING_EC2_HOST=${MONITORING_EC2_HOST}
    volumes:
      - ../ec2/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - wir-network

networks:
  wir-network:
    driver: bridge
